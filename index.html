<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PROTOCOL</title>
    <meta name="google" content="notranslate">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Твоя фонова мапа */
        #bg-map-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: url('https://upload.wikimedia.org/wikipedia/commons/c/c4/Earth_map_blank_black.svg') no-repeat center;
            background-size: cover;
            opacity: 0.12;
            filter: brightness(0.4);
        }

        /* Твоя Шкала Прогресу */
        .progress-section {
            margin-top: 50px;
            text-align: center;
            width: 100%;
        }

        .progress-value {
            font-size: 5rem; /* Твій великий розмір */
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Текстова анімація */
        .text-zone {
            max-width: 700px;
            text-align: center;
            padding: 20px;
            min-height: 120px;
            text-transform: uppercase;
        }

        .word-fade { opacity: 0; display: inline-block; transition: 0.4s; margin-right: 6px; }
        .word-fade.visible { opacity: 1; }
        .highlight { color: #00ff41; font-weight: bold; }

        /* Твоя Сітка Гаманців (Оригінальні розміри) */
        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1000px;
        }

        .wallet-card {
            border: 1px solid #222;
            padding: 25px;
            text-align: center;
            transition: 0.6s;
            background: rgba(0,0,0,0.6);
        }

        .active-pulse {
            border-color: rgba(0, 255, 61, 0.4) !important;
            box-shadow: 0 0 10px rgba(0, 255, 61, 0.2);
        }

        /* Кнопки */
        .init-button {
            display: inline-block;
            margin-top: 15px;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 12px;
        }

        /* Лог транзакцій знизу */
        .transaction-log {
            width: 90%;
            max-width: 1000px;
            margin-top: 30px;
            font-size: 10px;
            color: #666;
            border-top: 1px solid #222;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="bg-map-container" class="notranslate" translate="no"></div>

    <div class="progress-section">
        <div class="progress-value">0,1002%</div>
        <div style="color: #ff4d4d; letter-spacing: 5px;">СТВОРЕННЯ АНОМАЛІЇ</div>
    </div>

    <div class="text-zone">
        <div id="void-output"></div>
        <div id="hidden-source" style="display:none;">
            РОЗМІР&nbsp;ІНІЦІАЦІЇ&nbsp;ВИЗНАЧАЄ&nbsp;ВАШ&nbsp;СТАТУС.&nbsp;ВАШ&nbsp;ВНЕСОК&nbsp;ВИЗНАЧАЄ&nbsp;ВАШЕ&nbsp;МАЙБУТНЄ.&nbsp;НЕ&nbsp;ЗАЛИШАЙСЯ&nbsp;ЗОВНІ.&nbsp;ДОСТУП&nbsp;БУДЕ&nbsp;НАДАНО&nbsp;ТІЛЬКИ&nbsp;ОБРАНИМ.
        </div>
    </div>

    <div class="wallets-grid notranslate" translate="no">
        <div class="wallet-card">
            <div>₿</div><div class="name">BITCOIN</div>
            <a href="LINK_1" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card">
            <div>Ξ</div><div class="name">ERC20</div>
            <a href="LINK_2" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card">
            <div>₮</div><div class="name">TRC20</div>
            <a href="LINK_3" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card">
            <div>◎</div><div class="name">SOLANA</div>
            <a href="LINK_4" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card">
            <div>✕</div><div class="name">RIPPLE</div>
            <a href="LINK_5" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card">
            <div>Б</div><div class="name">BEP20</div>
            <a href="LINK_6" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
    </div>

    <audio id="void-audio" loop>
        <source src="твій_файл.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('void-audio');
        const output = document.getElementById('void-output');
        const source = document.getElementById('hidden-source');

        // ЗАПУСК МУЗИКИ
        function playMusic() {
            audio.play().catch(() => {});
            document.removeEventListener('click', playMusic);
        }
        document.addEventListener('click', playMusic);

        // АНІМАЦІЯ ТЕКСТУ
        async function runText() {
            await new Promise(r => setTimeout(r, 1000));
            const words = source.innerText.trim().split(/\s+/);
            for (let word of words) {
                let span = document.createElement('span');
                span.innerHTML = word + ' ';
                span.className = 'word-fade';
                if (word.includes("ТІЛЬКИ") || word.includes("ONLY")) span.classList.add('highlight');
                output.appendChild(span);
                await new Promise(r => setTimeout(r, 250));
                span.classList.add('visible');
                if (span.classList.contains('highlight')) await new Promise(r => setTimeout(r, 500));
            }
            startPulse();
        }

        function startPulse() {
            document.querySelectorAll('.wallet-card').forEach((c, i) => {
                setTimeout(() => c.classList.add('active-pulse'), i * 300);
            });
        }

        window.addEventListener('load', runText);
    </script>
</body>
</html>
