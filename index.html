<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_PROTOCOL</title>
    <style>
        :root { --main: #fff; --accent: #ff0000; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 !important; color: var(--main); 
            font-family: 'Courier New', monospace; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }

        /* Шум на фоні */
        .noise { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url(https://media.giphy.com/media/oEI9uWUicKgH6/giphy.gif); 
            opacity: 0.03; pointer-events: none; z-index: 1; 
        }

        /* Екран блокування (Вирішує проблему зі звуком та скриптами) */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        #intro-text {
            font-size: 1rem; color: var(--accent); letter-spacing: 5px;
            animation: pulse 1s infinite; text-transform: uppercase;
        }

        .container { 
            position: relative; z-index: 10; text-align: center; 
            width: 90%; max-width: 480px; padding: 20px; 
            border: 1px solid #151515; background: #000; 
            display: none; /* Сховано до старту */
        }

        .header { font-size: 0.6rem; color: var(--accent); letter-spacing: 4px; margin-bottom: 15px; text-transform: uppercase; }
        .percent { font-size: 5.5rem; font-weight: 900; letter-spacing: -5px; margin: 10px 0; line-height: 1; }
        .box { font-size: 0.7rem; color: #444; margin: 20px 0; border-top: 1px solid #111; border-bottom: 1px solid #111; padding: 15px 0; text-transform: uppercase; line-height: 1.5; }
        .box b { color: #fff; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn { 
            border: 1px solid #151515; padding: 15px 5px; cursor: pointer; 
            transition: 0.1s; background: #000; display: flex; 
            flex-direction: column; align-items: center; 
        }
        .btn:hover { background: #fff; color: #000; }
        
        /* Щоб клік йшов тільки на кнопку, а не на текст всередині */
        .sym, .net, .act { pointer-events: none; }
        
        .sym { font-size: 1.5rem; margin-bottom: 5px; }
        .net { font-size: 0.45rem; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .act { font-size: 0.6rem; font-weight: bold; letter-spacing: 1px; border-top: 1px solid #111; width: 100%; padding-top: 5px; }
        
        .log { margin-top: 25px; text-align: left; border: 1px solid #111; padding: 10px; background: #050505; min-height: 80px; }
        .log-t { font-size: 0.5rem; color: var(--accent); margin-bottom: 8px; letter-spacing: 2px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .line { font-size: 0.55rem; color: #333; display: flex; justify-content: space-between; margin-bottom: 4px; animation: fadeIn 0.4s ease-in; }
        .line span { color: #eee; }
        
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        .addr { border: 1px solid #222; padding: 20px; margin: 20px; font-size: 0.8rem; word-break: break-all; width: 80%; text-align: center; color: #fff; background: #050505; }
        .close-btn { margin-top: 30px; background: none; border: 1px solid #fff; color: #fff; padding: 10px 30px; cursor: pointer; font-size: 0.6rem; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
