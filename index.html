<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PROTOCOL</title>
    <meta name="google" content="notranslate">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Фонова мапа світу */
        #bg-map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: url('https://upload.wikimedia.org/wikipedia/commons/c/c4/Earth_map_blank_black.svg') no-repeat center;
            background-size: cover;
            opacity: 0.12;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Текстова зона */
        .text-trigger-zone {
            margin-top: 15vh;
            max-width: 800px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .dynamic-text {
            font-size: 1.2rem;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-height: 150px;
        }

        /* Анімація появи слів */
        .word-fade {
            opacity: 0;
            display: inline-block;
            transition: opacity 0.4s ease, transform 0.4s ease;
            margin-right: 8px;
        }

        .word-fade.visible {
            opacity: 1;
        }

        .highlight-word {
            color: #00ff41;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        /* Сітка гаманців */
        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px auto;
            max-width: 900px;
            z-index: 5;
        }

        .wallet-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #111;
            padding: 30px;
            text-align: center;
            transition: all 0.8s ease;
        }

        /* Слабке неонове підсвічування рамок (-60% яскравості) */
        .active-pulse {
            border-color: rgba(0, 255, 65, 0.35) !important;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }

        .icon { font-size: 2rem; margin-bottom: 10px; color: #fff; }
        .name { font-size: 0.8rem; margin-bottom: 15px; letter-spacing: 1px; }

        .init-button {
            color: #00ff41;
            border: 1px solid #00ff41;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 0.7rem;
            display: inline-block;
            transition: 0.3s;
        }

        .init-button:hover {
            background: #00ff41;
            color: #000;
        }

        @media (max-width: 768px) {
            .wallets-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="bg-map-container" class="notranslate" translate="no"></div>

    <div class="text-trigger-zone">
        <div id="void-output" class="dynamic-text"></div>
        <div id="hidden-source" style="display:none;">
            РОЗМІР&nbsp;ІНІЦІАЦІЇ&nbsp;ВИЗНАЧАЄ&nbsp;ВАШ&nbsp;СТАТУС.&nbsp;ВАШ&nbsp;ВНЕСОК&nbsp;ВИЗНАЧАЄ&nbsp;ВАШЕ&nbsp;МАЙБУТНЄ.&nbsp;НЕ&nbsp;ЗАЛИШАЙСЯ&nbsp;ЗОВНІ.&nbsp;ДОСТУП&nbsp;БУДЕ&nbsp;НАДАНО&nbsp;ТІЛЬКИ&nbsp;ОБРАНИМ.&nbsp;ЗБЕРИ&nbsp;СВІД&nbsp;ФРАЗУ&nbsp;ДЛЯ&nbsp;НАСТУПНОГО&nbsp;КРОКУ.
        </div>
    </div>

    <div class="wallets-grid notranslate" translate="no">
        <div class="wallet-card" id="w1">
            <div class="icon">₿</div><div class="name">BITCOIN</div>
            <a href="LINK_1" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card" id="w2">
            <div class="icon">Ξ</div><div class="name">ERC20</div>
            <a href="LINK_2" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card" id="w3">
            <div class="icon">₮</div><div class="name">TRC20</div>
            <a href="LINK_3" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card" id="w4">
            <div class="icon">◎</div><div class="name">SOLANA</div>
            <a href="LINK_4" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card" id="w5">
            <div class="icon">✕</div><div class="name">RIPPLE</div>
            <a href="LINK_5" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
        <div class="wallet-card" id="w6">
            <div class="icon">Б</div><div class="name">BEP20</div>
            <a href="LINK_6" class="init-button">ІНІЦІАЦІЯ</a>
        </div>
    </div>

    <audio id="void-ambient" loop>
        <source src="твій_файл_музики.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('void-ambient');
        const source = document.getElementById('hidden-source');
        const output = document.getElementById('void-output');

        // 1. АВТОЗАПУСК МУЗИКИ ПРИ ВЗАЄМОДІЇ
        function enableAudio() {
            audio.play().catch(() => {});
            document.removeEventListener('mousedown', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
            document.removeEventListener('keydown', enableAudio);
        }
        document.addEventListener('mousedown', enableAudio);
        document.addEventListener('touchstart', enableAudio);
        document.addEventListener('keydown', enableAudio);

        // 2. АНІМАЦІЯ СЛІВ
        async function runSequence() {
            // Пауза 1.2с для того, щоб перекладач встиг обробити прихований текст
            await new Promise(r => setTimeout(r, 1200));
            
            const text = source.innerText.trim();
            const words = text.split(/\s+/);
            output.innerHTML = '';

            for (let word of words) {
                let span = document.createElement('span');
                span.innerHTML = word;
                span.className = 'word-fade';
                
                // Якщо слово "ТІЛЬКИ" (або "ONLY" при перекладі) - виділяємо його
                if (word.toUpperCase().includes("ТІЛЬКИ") || word.toUpperCase().includes("ONLY")) {
                    span.classList.add('highlight-word');
                }
                
                output.appendChild(span);
                
                // Ефект появи слова
                await new Promise(r => setTimeout(r, 280)); 
                span.classList.add('visible');

                // Додаткова затримка на важливих словах
                if (span.classList.contains('highlight-word')) {
                    await new Promise(r => setTimeout(r, 600));
                }
            }

            // 3. ПІДСВІТКА ГАМАНЦІВ ПІСЛЯ ТЕКСТУ
            startWalletPulse();
        }

        function startWalletPulse() {
            const cards = document.querySelectorAll('.wallet-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('active-pulse');
                }, index * 350); // Почерговий запуск
            });
        }

        window.addEventListener('load', runSequence);
    </script>
</body>
</html>
