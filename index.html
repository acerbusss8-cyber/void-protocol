<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PROTOCOL</title>
    <style>
        /* Стилістика Порожнечі */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }

        .manifest {
            color: #00ffff;
            font-style: italic;
            border: 1px dashed #333;
            padding: 25px;
            margin-bottom: 40px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .node-info {
            color: #ff0000;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .wallet-address {
            background: #111;
            border: 1px solid #444;
            padding: 15px;
            font-size: 14px;
            word-break: break-all;
            color: #ccc;
            margin-bottom: 30px;
        }

        .input-group {
            margin-top: 20px;
        }

        input {
            background: #000;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 12px;
            width: 80%;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px #00ffff;
        }

        #word-display {
            margin-top: 40px;
            font-size: 20px;
            color: #ff00ff;
            min-height: 30px;
        }

        .footer-logo {
            margin-top: 50px;
            font-size: 24px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="manifest">
            Architect of the Silence. VOID is the inevitable digital reset. <br>
            Access isn’t bought, it’s earned. Join the anomaly or remain static. <br>
            0808 is live. ᚦ
        </div>

        <div class="node-info">ВУЗОЛ: BSC / ETH / USDT</div>
        
        <div class="wallet-address">
            0x847AeC161Eb94BD10529f950fc5a8d3534f07AF
        </div>

        <div class="input-group">
            <input type="text" id="txid-input" placeholder="ВСТАВИТИ ХЕШ ТРАНЗАКЦІЇ (TXID)">
            <br>
            <button onclick="processVoidHash()">DECODE_HASH</button>
        </div>

        <div id="word-display">_ОЧІКУЄМО_НА_ХЕШ_</div>

        <div class="footer-logo">VOID._</div>
    </div>

    <script>
        // КОНФІГУРАЦІЯ
        // Сюди вставляється твій ключ Tatum (той, що ти давав)
        const API_KEY = "ТВІЙ_API_KEY_ТУТ"; 
        const MY_WALLET = "0x847AeC161Eb94BD10529f950fc5a8d3534f07AF";

        // 12 Слів Маніфесту
        const VOID_WORDS = [
            "ARCHITECT", "UNLOCKS", "FORBIDDEN", "CHAMBER", 
            "SILENCE", "TRANSFORMS", "ANOMALY", "INTO", 
            "SUPREME", "RADIANCE", "ETERNAL", "DOMINION"
        ];

        async function processVoidHash() {
            const txId = document.getElementById('txid-input').value.trim();
            const display = document.getElementById('word-display');

            if (!txId) {
                alert("Хеш відсутній");
                return;
            }

            display.innerText = "_ДЕШИФРУВАННЯ_...";

            try {
                // Перевірка через мережу BSC (основна для твоїх адрес)
                const response = await fetch(`https://api.tatum.io/v3/blockchain/transaction/BSC/${txId}`, {
                    method: 'GET',
                    headers: { 'x-api-key': API_KEY }
                });

                const data = await response.json();

                // Перевірка: транзакція успішна + на твій гаманець
                if (response.ok && (data.to === MY_WALLET || data.address === MY_WALLET)) {
                    
                    // Перевірка на дублікат (щоб не юзали один хеш двічі)
                    let used = JSON.parse(localStorage.getItem('void_used_txs') || "[]");
                    if (used.includes(txId)) {
                        display.innerText = "_ХЕШ_ВЖЕ_ВИКОРИСТАНО_";
                        return;
                    }

                    // Прогрес видачі слів
                    let step = parseInt(localStorage.getItem('void_step') || "0");

                    if (step < 12) {
                        const nextWord = VOID_WORDS[step];
                        used.push(txId);
                        localStorage.setItem('void_used_txs', JSON.stringify(used));
                        localStorage.setItem('void_step', step + 1);
                        
                        display.innerText = `СЛОВО ${step + 1}: ${nextWord}`;
                    } else {
                        display.innerText = "ДОСТУП НАДАНО: КОД ЗІБРАНО";
                    }
                } else {
                    display.innerText = "_ТРАНЗАКЦІЯ_НЕВІРНА_";
                }
            } catch (err) {
                display.innerText = "_ПОМИЛКА_МЕРЕЖІ_";
                console.error(err);
            }
        }
    </script>
</body>
</html>
