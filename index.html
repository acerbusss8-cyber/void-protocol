<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_PROTOCOL // ANOMALY</title>
    <style>
        * { background-image: none !important; box-sizing: border-box; }
        :root { --main: #fff; --accent: #ff0000; }
        html, body { background: #000 !important; margin: 0; padding: 0; width: 100%; height: 100%; color: var(--main); font-family: 'Courier New', monospace; overflow-x: hidden; display: flex; justify-content: center; align-items: center; }
        .noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url(https://media.giphy.com/media/oEI9uWUicKgH6/giphy.gif); opacity: 0.04; pointer-events: none; z-index: 5; }
        .frame { z-index: 10; text-align: center; width: 95%; max-width: 500px; padding: 20px; border: 1px solid #111; position: relative; background: #000; }
        .sys-header { font-size: 0.6rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 5px; font-weight: bold; }
        .pct { font-size: 6.5rem; font-weight: 900; margin: 0; letter-spacing: -7px; line-height: 1; }
        .warning-box { font-size: 0.7rem; color: #555; margin: 15px 0; border-top: 1px solid #111; border-bottom: 1px solid #111; padding: 18px 0; line-height: 1.6; }
        .warning-box b { color: #fff; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { border: 1px solid #222; padding: 15px 0; cursor: pointer; transition: 0.2s; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 110px; }
        .btn:hover { border-color: var(--main); }
        .sym { font-size: 1.6rem; display: block; margin-bottom: 5px; }
        .info { font-size: 0.45rem; color: #444; font-weight: bold; margin-bottom: 5px; }
        .call { font-size: 0.5rem; font-weight: 900; letter-spacing: 1px; border-top: 1px solid #111; padding-top: 5px; width: 85%; }
        .entries-box { margin-top: 20px; text-align: left; border: 1px solid #111; padding: 10px; }
        .entries-title { font-size: 0.5rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .entry-line { font-size: 0.55rem; color: #333; margin-bottom: 4px; display: flex; justify-content: space-between; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .addr { border: 1px solid #222; padding: 20px; margin: 15px 0; font-size: 0.8rem; color: #fff; word-break: break-all; width: 90%; text-align: center; background: #050505; }
        input { width: 90%; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 15px; text-align: center; outline: none; font-family: monospace; margin-bottom: 10px; }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 12px 40px; cursor: pointer; font-size: 0.7rem; font-weight: bold; width: 90%; }
        #res { margin-top: 15px; font-size: 1.2rem; color: #00ffff; letter-spacing: 2px; }
        #prog { font-size: 0.6rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="frame">
        <div class="sys-header">ANOMALY_CREATING</div>
        <div class="pct" id="pv">0.0104%</div>
        <div class="warning-box">
            INITIATION SIZE DEFINES YOUR STATUS. <br>
            YOUR <b>CONTRIBUTION</b> DETERMINES YOUR FUTURE. <br>
            DO NOT REMAIN <b>OUTSIDE</b>. <br>
            <i>ACCESS GRANTED TO THE <b>CHOSEN</b>.</i>
        </div>
        <div class="grid">
            <div class="btn" onclick="openNode('BTC')"><span class="sym">ᚦ</span><span class="info">BTC</span><span class="call">INITIATE</span></div>
            <div class="btn" onclick="openNode('ETH')"><span class="sym">Ξ</span><span class="info">ERC20</span><span class="call">INITIATE</span></div>
            <div class="btn" onclick="openNode('USDT')"><span class="sym">₮</span><span class="info">TRC20</span><span class="call">INITIATE</span></div>
            <div class="btn" onclick="openNode('SOL')"><span class="sym">◎</span><span class="info">SOLANA</span><span class="call">INITIATE</span></div>
            <div class="btn" onclick="openNode('XRP')"><span class="sym">✕</span><span class="info">RIPPLE</span><span class="call">INITIATE</span></div>
            <div class="btn" onclick="openNode('BNB')"><span class="sym">B</span><span class="info">BEP20</span><span class="call">INITIATE</span></div>
        </div>
        <div class="entries-box"><div class="entries-title">RECENT_INITIATIONS</div><div id="en"></div></div>
    </div>
    <div id="modal">
        <div class="sys-header" id="mh">NODE_STABILIZED</div>
        <div class="addr" id="ma"></div>
        <input type="text" id="tx-hash" placeholder="PASTE_TRANSACTION_HASH">
        <button class="action-btn" onclick="verifyTx()">DECODE_TRANSACTION</button>
        <div id="res"></div>
        <div id="prog">PROGRESS: 0/12</div>
        <button style="margin-top:30px; background:none; border:none; color:#444; cursor:pointer; font-size:0.6rem;" onclick="closeModal()">[ CLOSE_CONNECTION ]</button>
    </div>

    <script>
        const WALLETS = {
            'BTC': 'bc1q47tvmp6gsz8ev9um6rrqx8ts27uhm8tpmm6syx',
            'ETH': '0x847AeC161Eb94BD10529f950fc5a8d3534f07AF',
            'USDT': 'TRpSaJFN3k8vjkCoY6M4kZvX1d9behLKUN',
            'SOL': 'HqgjkDPXqcQkoXPnvAeUUehggCMmjdLqFHWonAZPrT',
            'XRP': 'r9T2KvSzUrhdni4siGxNvAPFXLFuzqjUw8',
            'BNB': '0x847AeC161Eb94BD10529f950fc5a8d3534f07AF'
        };
        const _v = ['ARCHITECT','UNLOCKS','FORBIDDEN','CHAMBER','SILENCE','TRANSFORMS','ANOMALY','INTO','SUPREME','RADIANCE','ETERNAL','DOMINION'];
        const _tk = "t-69e600ecd26a54d7788a07c6-15efdf2dc77e4c7a8fe42309"; 
        let _cN = "";

        function openNode(n) {
            _cN = n;
            document.getElementById('ma').innerText = WALLETS[n];
            document.getElementById('mh').innerText = "NODE_ACTIVE: " + n;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('tx-hash').value = '';
            document.getElementById('res').innerText = '';
            updateP();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function updateP() {
            let s = localStorage.getItem('_v_s') || "0";
            document.getElementById('prog').innerText = "PROGRESS: " + s + "/12";
        }

        async function verifyTx() {
            const h = document.getElementById('tx-hash').value.trim();
            const rDisplay = document.getElementById('res');
            if(!h) return;

            let used = JSON.parse(localStorage.getItem('_v_t') || "[]");
            if(used.includes(h)) { rDisplay.innerText = "HASH_USED"; return; }

            rDisplay.innerText = "VALIDATING...";
            try {
                let url = "";
                // Прямі маршрути для Tatum API
                if (_cN === 'BNB') url = `https://api.tatum.io/v3/blockchain/transaction/BSC/${h}`;
                else if (_cN === 'ETH') url = `https://api.tatum.io/v3/ethereum/transaction/${h}`;
                else if (_cN === 'SOL') url = `https://api.tatum.io/v3/solana/transaction/${h}`;
                else if (_cN === 'USDT') url = `https://api.tatum.io/v3/blockchain/transaction/TRON/${h}`;
                else url = `https://api.tatum.io/v3/blockchain/transaction/${_cN}/${h}`;

                const r = await fetch(url, { headers: {'x-api-key': _tk} });
                
                if(r.ok) {
                    let p = parseInt(localStorage.getItem('_v_s') || "0");
                    if(p < 12) {
                        used.push(h); 
                        localStorage.setItem('_v_t', JSON.stringify(used));
                        localStorage.setItem('_v_s', p + 1);
                        rDisplay.innerText = _v[p];
                        updateP();
                    }
                } else { rDisplay.innerText = "NOT_FOUND_IN_NODE"; }
            } catch(e) { rDisplay.innerText = "CONNECTION_ERROR"; }
        }

        function gen() {
            const l = document.getElementById('en');
            const id = Math.random().toString(16).substring(2,5).toUpperCase() + "..." + Math.random().toString(16).substring(2,5).toUpperCase();
            const am = (Math.random() * (340 - 46) + 46).toFixed(2);
            const d = document.createElement('div');
            d.className = 'entry-line';
            d.innerHTML = `<b>ID: ${id}</b> <span>$${am}</span> <b>STATUS: CHOSEN</b>`;
            l.prepend(d);
            if(l.children.length > 8) l.lastElementChild.remove();
        }
        setInterval(gen, 5000);
        for(let i=0; i<5; i++) gen();
    </script>
</body>
</html>
