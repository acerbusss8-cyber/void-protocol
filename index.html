<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID PROTOCOL</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ФОНОВА МАПА СВІТУ */
        #void-world-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: url('https://upload.wikimedia.org/wikipedia/commons/c/c4/Earth_map_blank_black.svg') no-repeat center;
            background-size: cover;
            opacity: 0.1;
            filter: invert(0.6) brightness(0.2);
        }

        /* ГОЛОВНИЙ КОНТЕЙНЕР */
        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding-top: 50px;
            z-index: 1;
        }

        .header-red {
            color: #ff0000;
            font-size: 12px;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .anomaly-counter {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* БЛОК ТЕКСТУ (Виправлені пробіли та переклад) */
        #void-text-display {
            font-size: 14px;
            color: #888;
            line-height: 1.8;
            margin-bottom: 50px;
            min-height: 120px;
            padding: 0 20px;
            text-transform: uppercase;
        }

        /* СІТКА ГАМАНЦІВ */
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 50px;
            padding: 0 10px;
        }

        .wallet-box {
            border: 1px solid #333;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.5s ease;
            background: rgba(0,0,0,0.5);
        }

        .wallet-box img {
            width: 30px;
            filter: grayscale(1) invert(1);
            margin-bottom: 10px;
        }

        .wallet-name {
            font-size: 10px;
            color: #555;
            margin-bottom: 10px;
        }

        .initiation-btn {
            font-size: 12px;
            color: #fff;
            letter-spacing: 2px;
            font-style: italic;
        }
