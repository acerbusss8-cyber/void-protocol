<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ANOMALY | CREATOR PROTOCOL</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -100;
            transform: translateX(-50%) translateY(-50%);
            opacity: 0.4; filter: grayscale(100%) contrast(120%);
        }

        .scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.3); box-shadow: 0 0 15px #fff;
            animation: scan 4s linear infinite; z-index: 10;
        }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        .container { z-index: 1; text-align: center; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 10px; border: 1px solid #222; }

        .percentage {
            font-size: 4rem; font-weight: bold; margin: 0;
            letter-spacing: -2px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .creators-stat { font-size: 0.8rem; letter-spacing: 3px; color: #555; margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .asset {
            border: 1px solid #333; padding: 15px; cursor: pointer;
            transition: 0.3s; background: rgba(10,10,10,0.8);
        }
        .asset:hover { border-color: #fff; background: #111; }
        .sigil { font-size: 1.8rem; margin-bottom: 5px; }
        .label { font-size: 0.6rem; color: #666; letter-spacing: 1px; }

        /* Вікно з адресою */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #000; padding: 20px; text-align: center;
            display: none; z-index: 1000; border-radius: 5px; width: 80%; max-width: 400px;
        }
        #modal h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; }
        #addr-text { word-break: break-all; font-weight: bold; font-size: 0.8rem; margin: 15px 0; display: block; background: #eee; padding: 10px; }
        .close-btn { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="scanner"></div>

    <div id="modal">
        <h3 id="modal-title">INJECTION POINT</h3>
        <span id="addr-text"></span>
        <div style="font-size: 0.6rem; margin-bottom: 10px;">АДРЕСУ СКОПІЙОВАНО</div>
        <button class="close-btn" onclick="closeModal()">ЗАКРИТИ</button>
    </div>

    <div class="container">
        <div class="percentage" id="percent-display">0.0001%</div>
        <div class="creators-stat" id="creators-display">ACTIVE CREATORS: 7</div>

        <div class="grid">
            <div class="asset" onclick="showAddr('BTC', 'bc1q47tvmp6gsz8ev9um6rrqx8ts27uhm8tpmm6syx')">
                <div class="sigil">ᚦ</div><div class="label">BTC / COLD</div>
            </div>
            <div class="asset" onclick="showAddr('ETH', '0xC847AeC161Eb94BD10529f950fc5a8d3534f07AF')">
                <div class="sigil">Ξ</div><div class="label">ETH / GAS</div>
            </div>
            <div class="asset" onclick="showAddr('SOL', 'HqgjkDPXqcQkoXPnvAeUuUehggCMmjdLqdFHWonAZPrT')">
                <div class="sigil">◎</div><div class="label">SOL / LIGHT</div>
            </div>
            <div class="asset" onclick="showAddr('USDT (TRC20)', 'TRpSaJFN3k8vjkCoY6M4kZvX1d9behLKUN')">
                <div class="sigil">₮</div><div class="label">USDT / TRC20</div>
            </div>
            <div class="asset" onclick="showAddr('XRP', 'r9T2KvSzUrhdni4siGxNvAPFXLFuzqjUw8')">
                <div class="sigil">✕</div><div class="label">XRP / RIPPLE</div>
            </div>
            <div class="asset" onclick="showAddr('BNB', '0xC847AeC161Eb94BD10529f950fc5a8d3534f07AF')">
                <div class="sigil">B</div><div class="label">BNB / CHAIN</div>
            </div>
        </div>
    </div>

    <script>
        function showAddr(coin, addr) {
            navigator.clipboard.writeText(addr);
            document.getElementById('modal-title').innerText = "INJECTING " + coin;
            document.getElementById('addr-text').innerText = addr;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Авто-оновлення відсотків (симуляція для вайбу)
        setInterval(() => {
            let current = parseFloat(document.getElementById('percent-display').innerText);
            if(current < 0.001) {
                document.getElementById('percent-display').innerText = (current + 0.00001).toFixed(4) + "%";
            }
        }, 10000);
    </script>
</body>
</html>
