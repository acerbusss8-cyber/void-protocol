<div id="void-source-text" style="display:none;" aria-hidden="true" translate="yes">
    РОЗМІР ІНІЦІАЦІЇ ВИЗНАЧАЄ ВАШ СТАТУС. ВАШ ВНЕСОК ВИЗНАЧАЄ ВАШЕ МАЙБУТНЄ. НЕ ЗАЛИШАЙСЯ ЗОВНІ. ДОСТУП БУДЕ НАДАНО ТІЛЬКИ ОБРАНИМ. ЗБЕРИ СІД ФРАЗУ ДЛЯ НАСТУПНОГО КРОКУ.
</div>

<div id="void-world-bg"></div>

<style>
    /* Фонова мапа */
    #void-world-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -2;
        background: url('https://upload.wikimedia.org/wikipedia/commons/c/c4/Earth_map_blank_black.svg') no-repeat center;
        background-size: cover;
        opacity: 0.12; /* Слабкий фон */
        filter: invert(0.6) brightness(0.3);
    }

    /* Контейнер для тексту (пробіли та інтервали) */
    #void-text-display {
        white-space: pre-wrap;
        word-spacing: 0.15em;
        line-height: 1.6;
        color: #00ff41;
        font-family: monospace;
        text-align: center;
        min-height: 3em;
        margin: 20px 0;
    }

    /* Крапка відвідувача (реальна активність) */
    .void-dot {
        position: absolute;
        width: 3px;
        height: 3px;
        background: #00ff41;
        border-radius: 50%;
        box-shadow: 0 0 8px #00ff41;
        animation: pulse-dot 3s infinite;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
    }
</style>

<script>
    // 1. ЛОГІКА ПОЯВИ ПО СЛОВАХ
    function initVoidText() {
        const source = document.getElementById('void-source-text');
        const display = document.getElementById('void-text-display');
        
        // Беремо вже перекладений текст
        const fullText = source.innerText || source.textContent;
        // Розбиваємо на слова, ігноруючи зайві пробіли перекладача
        const words = fullText.trim().split(/\s+/);
        let i = 0;

        display.innerHTML = '';

        function printWord() {
            if (i < words.length) {
                // Використовуємо &nbsp; для 100% гарантії роздільних слів на всіх мовах
                display.innerHTML += words[i] + '&nbsp;';
                i++;
                // Швидкість появи слів (250мс для комфортного читання)
                setTimeout(printWord, 250);
            } else {
                // Після тексту - підсвітка
                setTimeout(glowWallets, 500);
            }
        }
        printWord();
    }

    // 2. СТЕЛС-ПІДСВІТКА ГАМАНЦІВ (Тільки 6 блоків, яскравість -60%)
    function glowWallets() {
        // Знаходимо всі блоки ініціації (використовуй свій клас або селектор)
        const boxes = document.querySelectorAll('.wallet-box, [class*="initiation"]'); 
        boxes.forEach((box, index) => {
            if (index < 6) { // Обмежуємо лише шістьма блоками
                setTimeout(() => {
                    box.style.transition = "box-shadow 1.5s ease";
                    box.style.border = "1px solid rgba(0, 255, 65, 0.2)";
                    box.style.boxShadow = "0 0 12px rgba(0, 255, 65, 0.35)"; // М'який неон
                }, index * 350); // Послідовно
            }
        });
    }

    // 3. ГЕНЕРАЦІЯ КРАПОК НА МАПІ (Симуляція активних зон)
    function mapActivity() {
        const bg = document.getElementById('void-world-bg');
        const zones = [
            {t: '38%', l: '82%'}, {t: '42%', l: '78%'}, // Японія
            {t: '35%', l: '20%'}, {t: '45%', l: '25%'}, // США
            {t: '30%', l: '52%'}, {t: '48%', l: '58%'}  // Європа/Дубай
        ];
        
        zones.forEach(z => {
            const dot = document.createElement('div');
            dot.className = 'void-dot';
            dot.style.top = z.t;
            dot.style.left = z.l;
            bg.appendChild(dot);
        });
    }

    // Запуск системи
    window.addEventListener('load', () => {
        mapActivity();
        // Даємо 1.5 секунди Google Translate, щоб він встиг перекласти прихований текст
        setTimeout(initVoidText, 1500);
    });
</script>
